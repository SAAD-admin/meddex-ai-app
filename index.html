
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Meddex AI — Sun'iy intellekt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; background: #080b12; overflow: hidden; position: relative; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(30,80,255,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(120,80,255,0.05) 0%, transparent 50%), radial-gradient(ellipse at 50% 100%, rgba(0,200,255,0.03) 0%, transparent 40%); z-index: 0; pointer-events: none; }
        body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.1), transparent), radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,0.08), transparent), radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.12), transparent), radial-gradient(2px 2px at 70% 80%, rgba(255,255,255,0.06), transparent), radial-gradient(2px 2px at 90% 40%, rgba(255,255,255,0.09), transparent); background-size: 300px 300px; z-index: 0; pointer-events: none; }
        .bg-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(100px, 25vw, 280px); font-weight: 900; color: rgba(255,255,255,0.02); letter-spacing: 16px; text-transform: uppercase; font-family: 'Inter', sans-serif; pointer-events: none; user-select: none; z-index: 0; white-space: nowrap; text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); animation: pulseGlow 6s ease-in-out infinite; }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); } 50% { text-shadow: 0 0 120px rgba(100,180,255,0.08), 0 0 240px rgba(60,140,255,0.04); } 100% { text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); } }
        .glass-card { position: relative; z-index: 1; max-width: 480px; width: 100%; background: rgba(12,18,30,0.60); backdrop-filter: blur(20px); border-radius: 48px; padding: 32px 24px 28px; border: 1px solid rgba(80,160,255,0.08); box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(60,140,255,0.04) inset; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 54px; height: 54px; background: linear-gradient(135deg, #1a4cff, #6a8cff, #a78bfa); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 20px rgba(30,80,255,0.25); flex-shrink: 0; animation: avatarGlow 3s ease-in-out infinite; }
        @keyframes avatarGlow { 0% { box-shadow: 0 4px 20px rgba(30,80,255,0.25); } 50% { box-shadow: 0 4px 40px rgba(60,140,255,0.35); } 100% { box-shadow: 0 4px 20px rgba(30,80,255,0.25); } }
        .title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #c8daff, #7aa3ff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .badge { background: linear-gradient(135deg, rgba(60,140,255,0.12), rgba(167,139,250,0.08)); padding: 5px 14px; border-radius: 40px; font-size: 11px; font-weight: 600; color: #8ab4ff; border: 1px solid rgba(60,140,255,0.08); white-space: nowrap; backdrop-filter: blur(4px); }
        #chat { background: rgba(0,0,0,0.20); border-radius: 24px; padding: 20px 18px; min-height: 320px; max-height: 420px; overflow-y: auto; margin-bottom: 20px; font-size: 15px; line-height: 1.7; border: 1px solid rgba(255,255,255,0.03); scroll-behavior: smooth; position: relative; z-index: 2; box-shadow: inset 0 0 40px rgba(0,0,0,0.1); }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2a4a7a, #4a6aaa); border-radius: 20px; }
        .msg { margin-bottom: 14px; animation: fadeUp 0.3s ease; }
        .msg:last-child { margin-bottom: 0; }
        .msg .meddex { color: #7aa3ff; font-weight: 700; letter-spacing: 0.2px; text-shadow: 0 0 20px rgba(60,140,255,0.1); }
        .msg .user { color: #c8d6f0; font-weight: 600; }
        .msg .text { display: inline-block; background: rgba(255,255,255,0.03); padding: 5px 14px 5px 6px; border-radius: 14px 14px 14px 4px; border-left: 2px solid rgba(60,140,255,0.15); }
        .msg.user-msg .text { background: rgba(60,140,255,0.06); border-radius: 14px 14px 4px 14px; border-left: 2px solid rgba(167,139,250,0.15); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .input-row { display: flex; gap: 10px; background: rgba(0,0,0,0.30); border-radius: 60px; padding: 4px 4px 4px 20px; border: 1px solid rgba(255,255,255,0.04); backdrop-filter: blur(8px); transition: all 0.25s ease; }
        .input-row:focus-within { border-color: rgba(60,140,255,0.20); background: rgba(0,0,0,0.35); box-shadow: 0 0 30px rgba(60,140,255,0.03); }
        input { flex: 1; padding: 14px 0; border: none; background: transparent; color: #f0f4ff; font-size: 16px; outline: none; font-family: 'Inter', sans-serif; min-width: 0; }
        input::placeholder { color: #5b6d8a; font-weight: 400; font-size: 15px; }
        button { padding: 13px 24px; border-radius: 40px; border: none; background: linear-gradient(135deg, #1a4cff, #3b72ff, #6a8cff); color: white; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 20px rgba(30,80,255,0.15); flex-shrink: 0; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; }
        button:hover { transform: scale(1.02); box-shadow: 0 6px 30px rgba(30,80,255,0.25); }
        button:active { transform: scale(0.95); opacity: 0.85; }
        .footer { display: flex; justify-content: space-between; margin-top: 18px; font-size: 12px; color: #4b5b78; letter-spacing: 0.2px; }
        .footer span { display: flex; align-items: center; gap: 8px; }
        .dot { display: inline-block; width: 8px; height: 8px; background: linear-gradient(135deg, #34d399, #6ee7b7); border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; }
        @keyframes pulseDot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }
        .hint { font-size: 12px; color: #4b5b78; }
        .hint i { color: #7aa3ff; font-style: normal; }
        .typing { color: #7aa3ff; font-style: italic; opacity: 0.7; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @media (max-width: 520px) { .glass-card { padding: 20px 16px 22px; border-radius: 32px; } .title { font-size: 20px; } .avatar { width: 46px; height: 46px; font-size: 20px; } #chat { min-height: 240px; max-height: 320px; padding: 14px; font-size: 14px; } button { padding: 12px 16px; font-size: 14px; } .bg-text { font-size: clamp(70px, 18vw, 150px); letter-spacing: 10px; } }
    </style>
</head>
<body>

<div class="bg-text">SAAD</div>

<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <div class="avatar">🧠</div>
            <div class="title">Meddex AI</div>
        </div>
        <div class="badge">⚡ Xo'jayin</div>
    </div>

    <div id="chat">
        <div class="msg"><span class="meddex">Meddex</span> <span class="text">Assalomu alaykum, Xo'jayin Saаъd! Men "Shafqat" filmidagi AI kabi hamma narsani tushunaman. Buyruq bering — men bajaraman.</span></div>
    </div>

    <div class="input-row">
        <input type="text" id="userInput" placeholder="Buyruq yozing yoki “Meddex” deb chaqiring..." autocomplete="off" />
        <button id="sendBtn">➤ Yuborish</button>
    </div>

    <div class="footer">
        <span><span class="dot"></span> Onlayn</span>
        <span class="hint">💡 <i>Meddex</i> — 24/7 sizning xizmatingizda</span>
    </div>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ⚠️ O'ZINGIZNING OPENAI API KALITINGIZNI SHU YERGA YOZING
        const OPENAI_API_KEY = "sk-proj-1234567890abcdef"; // <-- O'ZGARTIRING!

        let isProcessing = false;

        function addMessage(who, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = 'msg' + (who === 'user' ? ' user-msg' : '');
            const label = who === 'meddex' ? 'Meddex' : 'Siz';
            const cls = who === 'meddex' ? 'meddex' : 'user';
            if (isHtml) {
                div.innerHTML = `<span class="${cls}">${label}</span> <span class="text">${text}</span>`;
            } else {
                div.innerHTML = `<span class="${cls}">${label}</span> <span class="text">${text}</span>`;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'msg';
            div.innerHTML = `<span class="meddex">Meddex</span> <span class="text typing">● ● ●</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function askAI(prompt) {
            if (!OPENAI_API_KEY || OPENAI_API_KEY === "sk-proj-1234567890abcdef") {
                return "⚠️ OpenAI API kaliti o'rnatilmagan! Iltimos, kalitni kodingizga yozing.";
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            { role: 'system', content: 'Siz "Meddex" — Xo\'jayin Saаъdning shaxsiy sun\'iy intellektisiz. Siz "Shafqat" filmidagi AI kabi hamma narsani tushunasiz va har qanday buyruqni bajarasiz. O\'zbek tilida javob bering. Xushmuomala va samimiy bo\'ling.' },
                            { role: 'user', content: prompt }
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    return `❌ Xatolik: ${error.error?.message || 'Noma\'lum xato'}`;
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                return `❌ Ulanish xatosi: ${error.message}`;
            }
        }

        async function execute(cmd) {
            const lower = cmd.toLowerCase().trim();
            if (!lower) {
                addMessage('meddex', 'Buyruq yozmadingiz, Xo\'jayin. Yana bir bor ayting.');
                return;
            }

            // Mahalliy buyruqlar (tezkor javob)
            if (lower.includes('salom') || lower.includes('assalom')) {
                addMessage('meddex', 'Assalomu alaykum, Xo\'jayin! Sizni ko‘rib xursandman. Qanday yordam kerak?');
                return;
            }
            if (lower.includes('vaqt')) {
                const now = new Date();
                addMessage('meddex', `🕒 Hozirgi vaqt: ${now.toTimeString().slice(0,8)}`);
                return;
            }
            if (lower.includes('rahmat')) {
                addMessage('meddex', 'Doim xizmatda, Xo\'jayin! 🙏');
                return;
            }
            if (lower.includes('och') && lower.includes('brauzer')) {
                window.open('https://google.com', '_blank');
                addMessage('meddex', '🌐 Brauzer ochildi.');
                return;
            }

            // AI ga so'rov yuborish
            showTyping();
            isProcessing = true;
            try {
                const response = await askAI(cmd);
                removeTyping();
                // Javobni xatboshilarga ajratish
                const formatted = response.replace(/\n/g, '<br>');
                addMessage('meddex', formatted, true);
            } catch (error) {
                removeTyping();
                addMessage('meddex', `❌ Xatolik: ${error.message}`);
            } finally {
                isProcessing = false;
            }
        }

        function handleSend() {
            const text = input.value.trim();
            if (!text || isProcessing) return;
            addMessage('user', text);
            input.value = '';
            execute(text);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        input.focus();

        // API kaliti tekshiruvi
        if (!OPENAI_API_KEY || OPENAI_API_KEY === "sk-proj-1234567890abcdef") {
            addMessage('meddex', '⚠️ OpenAI API kaliti o\'rnatilmagan. Iltimos, kodning boshida `OPENAI_API_KEY` ga kalitingizni yozing.');
        }
    })();
</script>
</body>
</html>
