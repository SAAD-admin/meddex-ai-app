<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Meddex AI — Sun'iy Intellekt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== GLOBAL ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #080b12;
            overflow: hidden;
            position: relative;
        }

        /* ===== ANIMATSIYALI FON ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(30,80,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(120,80,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0,200,255,0.04) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== YULDUZLAR ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.15), transparent),
                radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,0.10), transparent),
                radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.18), transparent),
                radial-gradient(2px 2px at 70% 80%, rgba(255,255,255,0.08), transparent),
                radial-gradient(2px 2px at 90% 40%, rgba(255,255,255,0.12), transparent),
                radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.20), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.14), transparent);
            background-size: 300px 300px;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== ORQA FONDAGI "SAAD" ===== */
        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(120px, 28vw, 320px);
            font-weight: 900;
            color: rgba(255,255,255,0.015);
            letter-spacing: 20px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
            user-select: none;
            z-index: 0;
            white-space: nowrap;
            text-shadow: 0 0 80px rgba(60,140,255,0.04), 0 0 160px rgba(60,140,255,0.02);
            animation: pulseGlow 8s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 80px rgba(60,140,255,0.04), 0 0 160px rgba(60,140,255,0.02); }
            50% { text-shadow: 0 0 120px rgba(100,180,255,0.07), 0 0 240px rgba(60,140,255,0.04); }
            100% { text-shadow: 0 0 80px rgba(60,140,255,0.04), 0 0 160px rgba(60,140,255,0.02); }
        }

        /* ===== GLASS KARTA ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            background: rgba(10,16,28,0.55);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border-radius: 56px;
            padding: 36px 28px 32px;
            border: 1px solid rgba(80,160,255,0.06);
            box-shadow:
                0 40px 100px rgba(0,0,0,0.7),
                0 0 0 1px rgba(60,140,255,0.03) inset,
                0 0 60px rgba(60,140,255,0.02);
            transition: all 0.4s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1a4cff, #6a8cff, #a78bfa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 30px rgba(30,80,255,0.2);
            flex-shrink: 0;
            animation: avatarGlow 3s ease-in-out infinite;
        }
        @keyframes avatarGlow {
            0% { box-shadow: 0 4px 20px rgba(30,80,255,0.2); }
            50% { box-shadow: 0 4px 50px rgba(60,140,255,0.4); }
            100% { box-shadow: 0 4px 20px rgba(30,80,255,0.2); }
        }
        .title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #c8daff, #7aa3ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: linear-gradient(135deg, rgba(60,140,255,0.10), rgba(167,139,250,0.06));
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            color: #8ab4ff;
            border: 1px solid rgba(60,140,255,0.06);
            white-space: nowrap;
            backdrop-filter: blur(4px);
            letter-spacing: 0.4px;
        }

        /* ===== CHAT ===== */
        #chat {
            background: rgba(0,0,0,0.18);
            border-radius: 28px;
            padding: 24px 20px;
            min-height: 340px;
            max-height: 440px;
            overflow-y: auto;
            margin-bottom: 22px;
            font-size: 15px;
            line-height: 1.8;
            border: 1px solid rgba(255,255,255,0.02);
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.15);
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2a4a7a, #4a6aaa); border-radius: 20px; }

        .msg {
            margin-bottom: 16px;
            animation: fadeUp 0.35s ease;
        }
        .msg:last-child { margin-bottom: 0; }
        .msg .meddex {
            color: #7aa3ff;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-shadow: 0 0 30px rgba(60,140,255,0.08);
        }
        .msg .user {
            color: #c8d6f0;
            font-weight: 600;
        }
        .msg .text {
            display: inline-block;
            background: rgba(255,255,255,0.02);
            padding: 6px 16px 6px 8px;
            border-radius: 16px 16px 16px 4px;
            border-left: 2px solid rgba(60,140,255,0.10);
        }
        .msg.user-msg .text {
            background: rgba(60,140,255,0.04);
            border-radius: 16px 16px 4px 16px;
            border-left: 2px solid rgba(167,139,250,0.10);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== INPUT ===== */
        .input-row {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 60px;
            padding: 4px 4px 4px 24px;
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .input-row:focus-within {
            border-color: rgba(60,140,255,0.15);
            background: rgba(0,0,0,0.30);
            box-shadow: 0 0 40px rgba(60,140,255,0.02);
        }
        input {
            flex: 1;
            padding: 16px 0;
            border: none;
            background: transparent;
            color: #f0f4ff;
            font-size: 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }
        input::placeholder {
            color: #5b6d8a;
            font-weight: 400;
            font-size: 15px;
        }
        button {
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #1a4cff, #3b72ff, #6a8cff);
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 24px rgba(30,80,255,0.12);
            flex-shrink: 0;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }
        button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 40px rgba(30,80,255,0.20);
        }
        button:active { transform: scale(0.95); opacity: 0.85; }

        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #4b5b78;
            letter-spacing: 0.2px;
        }
        .footer span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #34d399, #6ee7b7);
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }
        .hint {
            font-size: 12px;
            color: #4b5b78;
        }
        .hint i {
            color: #7aa3ff;
            font-style: normal;
        }

        /* ===== TYPING ===== */
        .typing {
            color: #7aa3ff;
            font-style: italic;
            opacity: 0.6;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            .glass-card { padding: 22px 18px 24px; border-radius: 36px; }
            .title { font-size: 20px; }
            .avatar { width: 48px; height: 48px; font-size: 22px; }
            #chat { min-height: 240px; max-height: 320px; padding: 16px 14px; font-size: 14px; }
            button { padding: 12px 18px; font-size: 14px; }
            .bg-text { font-size: clamp(80px, 20vw, 160px); letter-spacing: 12px; }
        }
        @media (max-width: 400px) {
            .header { flex-wrap: wrap; gap: 8px; }
            .badge { font-size: 10px; padding: 3px 10px; }
            .input-row { padding-left: 16px; }
            input { font-size: 14px; padding: 12px 0; }
            button { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- ===== SAAD FON ===== -->
<div class="bg-text">SAAD</div>

<!-- ===== GLASS KARTA ===== -->
<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <div class="avatar">🧠</div>
            <div class="title">Meddex AI</div>
        </div>
        <div class="badge">⚡ Xo'jayin</div>
    </div>

    <div id="chat">
        <div class="msg"><span class="meddex">Meddex</span> <span class="text">Assalomu alaykum, Xo'jayin! Men sizning shaxsiy sun'iy intellektingizman. Buyruq bering — men bajaraman.</span></div>
    </div>

    <div class="input-row">
        <input type="text" id="userInput" placeholder="Buyruq yozing yoki gapiring..." autocomplete="off" />
        <button id="sendBtn">➤ Yuborish</button>
    </div>

    <div class="footer">
        <span><span class="dot"></span> Onlayn</span>
        <span class="hint">💡 <i>Meddex</i> — har doim siz bilan</span>
    </div>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isProcessing = false;
        let memory = [];

        // ============================================================
        // 🔐 XAVFSIZ API KALITI — BU YERDA YO'Q!
        // Kalitni faqat o'zingiz biladigan joyda saqlang.
        // Agar backend bo'lsa, kalitni serverda saqlang.
        // Hozirda faqat mahalliy buyruqlar ishlaydi.
        // ============================================================

        function addMessage(who, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = 'msg' + (who === 'user' ? ' user-msg' : '');
            const label = who === 'meddex' ? 'Meddex' : 'Siz';
            const cls = who === 'meddex' ? 'meddex' : 'user';
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<span class="${cls}">${label}</span> <span class="text">${content}</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (who === 'user') memory.push({ role: 'user', content: text });
            else memory.push({ role: 'assistant', content: text });
            if (memory.length > 50) memory.shift();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'msg';
            div.innerHTML = `<span class="meddex">Meddex</span> <span class="text typing">● ● ●</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // ===== MAHALLIY BUYRUQLAR =====
        async function execute(cmd) {
            const lower = cmd.toLowerCase().trim();
            if (!lower) {
                addMessage('meddex', 'Buyruq yozmadingiz, Xo\'jayin.');
                return;
            }

            // Salom
            const salom_sozlar = ['salom', 'assalom', 'hello', 'hola', 'bonjour', 'hallo', 'merhaba', 'привет', 'مرحبا', '你好', 'こんにちは', '안녕하세요'];
            if (salom_sozlar.some(s => lower.includes(s))) {
                const greetings = {
                    'uz': 'Assalomu alaykum, Xo\'jayin!',
                    'en': 'Hello, Master!',
                    'ru': 'Здравствуйте, Хозяин!',
                    'ar': 'السلام عليكم، سيدي!',
                    'tr': 'Merhaba, Efendim!',
                    'fr': 'Bonjour, Maître!',
                    'de': 'Hallo, Meister!',
                    'es': '¡Hola, Maestro!',
                    'zh': '你好，主人！',
                    'ja': 'こんにちは、主人！',
                    'ko': '안녕하세요, 주인님!'
                };
                const lang = detectLanguage(cmd);
                addMessage('meddex', greetings[lang] || greetings['uz']);
                return;
            }

            // Vaqt
            if (lower.includes('vaqt') || lower.includes('time') || lower.includes('время') || lower.includes('وقت')) {
                const now = new Date();
                addMessage('meddex', `🕒 ${now.toLocaleString()}`);
                return;
            }

            // Rahmat
            if (lower.includes('rahmat') || lower.includes('thanks') || lower.includes('спасибо') || lower.includes('شكرا')) {
                const thanks = {
                    'uz': 'Doim xizmatda, Xo\'jayin! 🙏',
                    'en': 'Always at your service, Master! 🙏',
                    'ru': 'Всегда к вашим услугам, Хозяин! 🙏',
                    'ar': 'في خدمتك دائمًا، سيدي! 🙏',
                    'tr': 'Her zaman hizmetinizdeyim, Efendim! 🙏',
                    'fr': 'Toujours à votre service, Maître! 🙏',
                    'de': 'Immer zu Ihren Diensten, Meister! 🙏',
                    'es': 'Siempre a su servicio, Maestro! 🙏'
                };
                const lang = detectLanguage(cmd);
                addMessage('meddex', thanks[lang] || thanks['uz']);
                return;
            }

            // Eslatma
            if (lower.includes('eslatma') && !lower.includes('lar')) {
                const note = lower.replace('eslatma', '').trim();
                if (note) {
                    if (!window.notes) window.notes = [];
                    window.notes.push(note);
                    addMessage('meddex', `✅ Eslatma saqlandi: “${note}”`);
                } else {
                    addMessage('meddex', 'Eslatma matnini yozing. Masalan: “eslatma uchrashuv 18:00”');
                }
                return;
            }
            if (lower.includes('eslatmalar')) {
                if (window.notes && window.notes.length) {
                    const list = window.notes.map((n, i) => `${i+1}. ${n}`).join('<br>');
                    addMessage('meddex', `📋 Eslatmalaringiz:<br>${list}`, true);
                } else {
                    addMessage('meddex', 'Hali eslatma yo‘q.');
                }
                return;
            }

            // Brauzer
            if (lower.includes('och') && lower.includes('brauzer')) {
                window.open('https://google.com', '_blank');
                addMessage('meddex', '🌐 Brauzer ochildi.');
                return;
            }

            // Xotira
            if (lower.includes('xotira') || lower.includes('eslab')) {
                if (memory.length > 2) {
                    const last = memory.slice(-3).map(m => `${m.role}: ${m.content}`).join('<br>');
                    addMessage('meddex', `🧠 Oxirgi eslab qolganlarim:<br>${last}`, true);
                } else {
                    addMessage('meddex', 'Hali xotirada yetarli ma\'lumot yo‘q.');
                }
                return;
            }

            // Qidiruv
            const searchKeywords = ['qidir', 'search', 'izla', 'top', 'qidiruv'];
            let isSearch = false;
            let searchQuery = lower;
            for (const kw of searchKeywords) {
                if (lower.startsWith(kw)) {
                    isSearch = true;
                    searchQuery = lower.replace(kw, '').trim();
                    break;
                }
            }
            if (!isSearch && (lower.includes('ob-havo') || lower.includes('yangilik') || lower.includes('narx') || lower.includes('kurs') || lower.includes('bugun'))) {
                isSearch = true;
                searchQuery = lower;
            }

            if (isSearch && searchQuery.length > 0) {
                showTyping();
                isProcessing = true;
                try {
                    const result = await searchWeb(searchQuery);
                    removeTyping();
                    addMessage('meddex', `🔎 ${result}`, true);
                } catch (e) {
                    removeTyping();
                    addMessage('meddex', `❌ ${e.message}`);
                } finally {
                    isProcessing = false;
                }
                return;
            }

            // ===== AGAR HECH QANDAY BUYRUK TOPILMASA =====
            addMessage('meddex', `“${cmd}” — bu buyruqni hali o‘rganmaganman. Iltimos, boshqasini bering.`);
        }

        // ===== QIDIRUV (DuckDuckGo — kalitsiz) =====
        async function searchWeb(query) {
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Qidiruv xizmati javob bermadi.');
                const data = await response.json();

                if (data.AbstractText && data.AbstractText.length > 0) {
                    let result = data.AbstractText;
                    if (data.AbstractURL) {
                        result += `<br><br>🔗 <a href="${data.AbstractURL}" target="_blank" style="color:#7aa3ff;">Manba</a>`;
                    }
                    return result;
                }
                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    let topics = data.RelatedTopics.slice(0, 3).map(t =>
                        `• ${t.Text ? t.Text.replace(/<[^>]+>/g, '').substring(0, 200) : ''}`
                    ).filter(t => t.length > 10);
                    if (topics.length > 0) {
                        return `🔍 Topilgan ma'lumotlar:<br>${topics.join('<br>')}`;
                    }
                }
                return '❌ Bu savol bo‘yicha aniq ma’lumot topilmadi. Iltimos, boshqacha so‘rang.';
            } catch (e) {
                return `❌ Qidiruv xatosi: ${e.message}`;
            }
        }

        // ===== TILNI ANIQLASH =====
        function detectLanguage(text) {
            const patterns = {
                'uz': /[oO']|[ққ]|[ғғ]|[ҳҳ]|[ўў]|salom|assalom|rahmat|vaqt/i,
                'ru': /[а-яА-Я]|привет|спасибо|время/i,
                'en': /[a-zA-Z]|hello|thanks|time|weather/i,
                'ar': /[اإأآببتثجحخدذرزسشصضطظعغفقكلمنهوي]|مرحبا|شكرا/i,
                'tr': /[çÇğĞıİöÖşŞüÜ]|merhaba|teşekkür|saat/i,
                'fr': /[éèêëàâîôûç]|bonjour|merci|temps/i,
                'de': /[äöüÄÖÜß]|hallo|danke|zeit/i,
                'es': /[ñÑáéíóú]|hola|gracias|tiempo/i,
                'zh': /[\u4e00-\u9fff]|你好|谢谢/i,
                'ja': /[\u3040-\u309f\u30a0-\u30ff]|こんにちは|ありがとう/i,
                'ko': /[\uac00-\ud7af]|안녕하세요|감사합니다/i
            };
            for (const [lang, pattern] of Object.entries(patterns)) {
                if (pattern.test(text)) return lang;
            }
            return 'uz';
        }

        // ===== YUBORISH =====
        function handleSend() {
            const text = input.value.trim();
            if (!text || isProcessing) return;
            addMessage('user', text);
            input.value = '';
            execute(text);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        input.focus();

        // ===== OVOZLI BUYRUQLAR =====
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'uz-UZ';
            recognition.continuous = false;
            recognition.interimResults = false;

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && e.ctrlKey) {
                    e.preventDefault();
                    recognition.start();
                    addMessage('meddex', '🎤 Gapingizni yozmoqdaman...');
                }
            });

            recognition.onresult = (e) => {
                const spoken = e.results[0][0].transcript;
                addMessage('user', '🎤 ' + spoken);
                execute(spoken);
            };

            recognition.onerror = () => {
                addMessage('meddex', '❌ Ovoz eshitilmadi. Qayta urinib ko\'ring.');
            };
        }
    })();
</script>
</body>
</html>
