<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meddex AI — Control Panel</title>
    <style>
        :root {
            --bg-main: #121214;
            --bg-card: #1a1a1e;
            --text-color: #ffffff;
            --accent-color: #00e5c0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a30;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .pulse {
            background-color: rgba(76, 175, 80, 0.2);
            color: var(--color-success);
            padding: 8px 16px;
            border-radius: 30px;
            animation: pulseeffect 2s infinite;
            font-size: 0.9rem;
            font-weight: bold;
        }
        @keyframes pulseeffect {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        /* Moslashuvchan va matn sig'adigan Grid tizimi */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            align-items: start;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid #2a2a30;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 3D Konteyner dizayni va joylashuvi */
        #three-container {
            width: 100%;
            height: 350px;
            background: #111113;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #2a2a30;
        }
        .workspace-chat {
            height: 380px;
            overflow-y: auto;
            border-bottom: 1px solid #2a2a30;
            padding-right: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .msg.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .msg.ai {
            background: #232329;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid var(--accent-color);
        }
        .input-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #121214;
            padding: 4px;
            border-radius: 30px;
            border: 1px solid #2a2a30;
        }
        .input-bar input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .btn-send {
            background: var(--accent-color);
            color: #000;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .btn-send:active {
            transform: scale(0.9);
        }
        /* Progress barlar */
        .metrics-zone {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .bar-group label {
            font-size: 0.85rem;
            color: #a1a1aa;
            display: block;
            margin-bottom: 6px;
        }
        .progress-bar {
            background-color: #2a2a30;
            border-radius: 8px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }
        .progress {
            background: linear-gradient(90deg, #007bff, var(--accent-color));
            height: 100%;
        }
    </style>
    <!-- Three.js Kutubxonasi -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <header>
        <h2>Meddex AI — "Shafqat" System Panel</h2>
        <div class="pulse">Tizim Faol</div>
    </header>

    <div class="main-grid">
        <!-- Chap tomonda 3D vizualizatsiya va ko'rsatkichlar -->
        <div>
            <div id="three-container"></div>
            <div class="card">
                <h3>Live Performance</h3>
                <div class="metrics-zone">
                    <div class="bar-group">
                        <label>Tushunish (94%)</label>
                        <div class="progress-bar"><div class="progress" style="width: 94%;"></div></div>
                    </div>
                    <div class="bar-group">
                        <label>Empatiya darajasi (91%)</label>
                        <div class="progress-bar"><div class="progress" style="width: 91%;"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- O'ng tomonda asosiy Chat interfeysi -->
        <div class="card">
            <h3>Central Workspace</h3>
            <div class="workspace-chat" id="workspaceChat">
                <div class="msg ai"><b>Meddex AI:</b> Assalomu alaykum. Men muloqotga tayyorman, his-tuyg'ularingizni va har qanday texnik yoki kreativ vazifangizni tahlil qila olaman.</div>
            </div>
            <div class="input-bar">
                <input type="text" id="userInput" placeholder="Xabaringizni yozing..." autocomplete="off">
                <button class="btn-send" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

<script>
    // --- 1. COCHING / API CONFIGURATION ---
    // Bepul Gemini API kalitingizni shu yerga joylashtiring
    const GEMINI_API_KEY = "Sizning_Google_Gemini_API_Kalitingiz"; 
    const GEMINI_URL = `https://googleapis.com{GEMINI_API_KEY}`;

    // --- 2. THREE.JS 3D AVATAR SYSTEM ---
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111113);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Yorug'lik effektlari
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0x00e5c0, 0.8);
    dirLight.position.set(3, 5, 3);
    scene.add(dirLight);

    // Meddex 3D Avatar asosi (Sci-Fi Sfera shakli va uning ichki yadrosi)
    const avatarGroup = new THREE.Group();
    
    const coreGeo = new THREE.SphereGeometry(0.8, 32, 32);
    const coreMat = new THREE.MeshStandardMaterial({ 
        color: 0x00e5c0, 
        roughness: 0.2,
        metalness: 0.8,
        emissive: 0x005544
    });
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    avatarGroup.add(coreMesh);

    // 🌟 OG'IZ (Mouth Lip-Sync obyekti)
    const mouthGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32);
    const mouthMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const mouthMesh = new THREE.Mesh(mouthGeo, mouthMat);
    mouthMesh.position.set(0, -0.2, 0.75);
    mouthMesh.rotation.x = Math.PI / 2;
    avatarGroup.add(mouthMesh);

    scene.add(avatarGroup);

    // Animatsiya dinamikasi o'zgaruvchilari
    let mouthScale = 0;
    function animate() {
        requestAnimationFrame(animate);
        
        // Kinodagi Meddex kabi nafas oluvchi sci-fi pulsatsiya effekti
        avatarGroup.position.y = Math.sin(Date.now() * 0.0015) * 0.06;
        avatarGroup.rotation.y += 0.005;
        
        // Ovoz chiqayotganda og'iz modelining dinamik kengayishi (Lip-Sync)
        mouthMesh.scale.set(1, 1, 1 + mouthScale * 8);

        renderer.render(scene, camera);
    }
    animate();

    // --- 3. WEB AUDIO API SIMULATION (LIP-SYNC) ---
    function startLipSyncAnimation(text) {
        if (!('speechSynthesis' in window)) return;
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU'; // O'zbek tili uchun muqobil eng yaqin va ravon audio til

        // Gapirish ritmiga moslab og'izni qimirlatish
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                mouthScale = 0.7;
                setTimeout(() => { mouthScale = 0; }, 120);
            }
        };
        utterance.onend = () => { mouthScale = 0; };
        
        window.speechSynthesis.speak(utterance);
    }

    // --- 4. GEMINI AI CORE INTEGRATION ---
    const chatBox = document.getElementById('workspaceChat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(sender, text) {
        const msgDiv = document.createElement('div');
