<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Meddex AI — DeepSeek V3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; background: #080b12; overflow: hidden; position: relative; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(30,80,255,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(120,80,255,0.05) 0%, transparent 50%), radial-gradient(ellipse at 50% 100%, rgba(0,200,255,0.03) 0%, transparent 40%); z-index: 0; pointer-events: none; }
        .bg-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(100px, 25vw, 280px); font-weight: 900; color: rgba(255,255,255,0.02); letter-spacing: 16px; text-transform: uppercase; font-family: 'Inter', sans-serif; pointer-events: none; user-select: none; z-index: 0; white-space: nowrap; text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); animation: pulseGlow 6s ease-in-out infinite; }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); } 50% { text-shadow: 0 0 120px rgba(100,180,255,0.08), 0 0 240px rgba(60,140,255,0.04); } 100% { text-shadow: 0 0 80px rgba(60,140,255,0.05), 0 0 160px rgba(60,140,255,0.02); } }
        .glass-card { position: relative; z-index: 1; max-width: 480px; width: 100%; background: rgba(12,18,30,0.60); backdrop-filter: blur(20px); border-radius: 48px; padding: 32px 24px 28px; border: 1px solid rgba(80,160,255,0.08); box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(60,140,255,0.04) inset; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 54px; height: 54px; background: linear-gradient(135deg, #1a4cff, #6a8cff, #a78bfa); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 20px rgba(30,80,255,0.25); flex-shrink: 0; animation: avatarGlow 3s ease-in-out infinite; }
        @keyframes avatarGlow { 0% { box-shadow: 0 4px 20px rgba(30,80,255,0.25); } 50% { box-shadow: 0 4px 40px rgba(60,140,255,0.35); } 100% { box-shadow: 0 4px 20px rgba(30,80,255,0.25); } }
        .title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #c8daff, #7aa3ff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .badge { background: linear-gradient(135deg, rgba(60,140,255,0.12), rgba(167,139,250,0.08)); padding: 5px 14px; border-radius: 40px; font-size: 11px; font-weight: 600; color: #8ab4ff; border: 1px solid rgba(60,140,255,0.08); white-space: nowrap; backdrop-filter: blur(4px); }
        #chat { background: rgba(0,0,0,0.20); border-radius: 24px; padding: 20px 18px; min-height: 320px; max-height: 420px; overflow-y: auto; margin-bottom: 20px; font-size: 15px; line-height: 1.7; border: 1px solid rgba(255,255,255,0.03); scroll-behavior: smooth; position: relative; z-index: 2; box-shadow: inset 0 0 40px rgba(0,0,0,0.1); }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2a4a7a, #4a6aaa); border-radius: 20px; }
        .msg { margin-bottom: 14px; animation: fadeUp 0.3s ease; }
        .msg:last-child { margin-bottom: 0; }
        .msg .meddex { color: #7aa3ff; font-weight: 700; letter-spacing: 0.2px; text-shadow: 0 0 20px rgba(60,140,255,0.1); }
        .msg .user { color: #c8d6f0; font-weight: 600; }
        .msg .text { display: inline-block; background: rgba(255,255,255,0.03); padding: 5px 14px 5px 6px; border-radius: 14px 14px 14px 4px; border-left: 2px solid rgba(60,140,255,0.15); }
        .msg.user-msg .text { background: rgba(60,140,255,0.06); border-radius: 14px 14px 4px 14px; border-left: 2px solid rgba(167,139,250,0.15); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .input-row { display: flex; gap: 10px; background: rgba(0,0,0,0.30); border-radius: 60px; padding: 4px 4px 4px 20px; border: 1px solid rgba(255,255,255,0.04); backdrop-filter: blur(8px); transition: all 0.25s ease; }
        .input-row:focus-within { border-color: rgba(60,140,255,0.20); background: rgba(0,0,0,0.35); box-shadow: 0 0 30px rgba(60,140,255,0.03); }
        input { flex: 1; padding: 14px 0; border: none; background: transparent; color: #f0f4ff; font-size: 16px; outline: none; font-family: 'Inter', sans-serif; min-width: 0; }
        input::placeholder { color: #5b6d8a; font-weight: 400; font-size: 15px; }
        button { padding: 13px 24px; border-radius: 40px; border: none; background: linear-gradient(135deg, #1a4cff, #3b72ff, #6a8cff); color: white; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 20px rgba(30,80,255,0.15); flex-shrink: 0; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; }
        button:hover { transform: scale(1.02); box-shadow: 0 6px 30px rgba(30,80,255,0.25); }
        button:active { transform: scale(0.95); opacity: 0.85; }
        .footer { display: flex; justify-content: space-between; margin-top: 18px; font-size: 12px; color: #4b5b78; letter-spacing: 0.2px; }
        .footer span { display: flex; align-items: center; gap: 8px; }
        .dot { display: inline-block; width: 8px; height: 8px; background: linear-gradient(135deg, #34d399, #6ee7b7); border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; }
        @keyframes pulseDot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }
        .hint { font-size: 12px; color: #4b5b78; }
        .hint i { color: #7aa3ff; font-style: normal; }
        .typing { color: #7aa3ff; font-style: italic; opacity: 0.7; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @media (max-width: 520px) { .glass-card { padding: 20px 16px 22px; border-radius: 32px; } .title { font-size: 20px; } .avatar { width: 46px; height: 46px; font-size: 20px; } #chat { min-height: 240px; max-height: 320px; padding: 14px; font-size: 14px; } button { padding: 12px 16px; font-size: 14px; } .bg-text { font-size: clamp(70px, 18vw, 150px); letter-spacing: 10px; } }
    </style>
</head>
<body>
<div class="bg-text">SAAD</div>
<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <div class="avatar">🧠</div>
            <div class="title">Meddex AI</div>
        </div>
        <div class="badge">⚡ DeepSeek V3</div>
    </div>
    <div id="chat">
        <div class="msg"><span class="meddex">Meddex</span> <span class="text">Assalomu alaykum, Xo'jayin! Men DeepSeek V3 bilan ishlayman. Istalgan savolingizga javob beraman.</span></div>
    </div>
    <div class="input-row">
        <input type="text" id="userInput" placeholder="Buyruq yozing..." autocomplete="off" />
        <button id="sendBtn">➤ Yuborish</button>
    </div>
    <div class="footer">
        <span><span class="dot"></span> Onlayn</span>
        <span class="hint">💡 DeepSeek V3 — eng kuchli ochiq model</span>
    </div>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isProcessing = false;
        let memory = [];

        // 🔑 SIZNING DEEPSEEK API KALITINGIZ
        const DEEPSEEK_API_KEY = "sk-208c7f77c57d44e697c5d9edc79b1e32";
        const DEEPSEEK_URL = "https://api.deepseek.com/v1/chat/completions";

        function addMessage(who, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = 'msg' + (who === 'user' ? ' user-msg' : '');
            const label = who === 'meddex' ? 'Meddex' : 'Siz';
            const cls = who === 'meddex' ? 'meddex' : 'user';
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<span class="${cls}">${label}</span> <span class="text">${content}</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (who === 'user') memory.push({ role: 'user', content: text });
            else memory.push({ role: 'assistant', content: text });
            if (memory.length > 50) memory.shift();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'msg';
            div.innerHTML = `<span class="meddex">Meddex</span> <span class="text typing">● ● ●</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // DeepSeek V3 ga so'rov
        async function askDeepSeek(prompt) {
            try {
                const response = await fetch(DEEPSEEK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: 'system', content: 'Siz "Meddex" — Xo\'jayin Saаъdning shaxsiy sun\'iy intellektisiz. "Shafqat" filmidagi AI kabi hamma narsani tushunasiz. O\'zbek tilida javob bering, agar foydalanuvchi boshqa tilda so\'rasa, shu tilda javob bering. Xushmuomala va samimiy bo\'ling.' },
                            ...memory.slice(-10),
                            { role: 'user', content: prompt }
                        ],
                        max_tokens: 1000,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    if (response.status === 429) {
                        await new Promise(resolve => setTimeout(resolve, 3000));
                        return askDeepSeek(prompt);
                    }
                    return `❌ Xatolik: ${error.error?.message || 'Noma\'lum xato'}`;
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                return `❌ Ulanish xatosi: ${error.message}`;
            }
        }

        // Qidiruv (DuckDuckGo)
        async function searchWeb(query) {
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Qidiruv xizmati javob bermadi.');
                const data = await response.json();

                if (data.AbstractText && data.AbstractText.length > 0) {
                    let result = data.AbstractText;
                    if (data.AbstractURL) {
                        result += `<br><br>🔗 <a href="${data.AbstractURL}" target="_blank" style="color:#7aa3ff;">Manba</a>`;
                    }
                    return result;
                }
                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    let topics = data.RelatedTopics.slice(0, 3).map(t =>
                        `• ${t.Text ? t.Text.replace(/<[^>]+>/g, '').substring(0, 200) : ''}`
                    ).filter(t => t.length > 10);
                    if (topics.length > 0) {
                        return `🔍 Topilgan ma'lumotlar:<br>${topics.join('<br>')}`;
                    }
                }
                return '❌ Bu savol bo‘yicha aniq ma’lumot topilmadi.';
            } catch (e) {
                return `❌ Qidiruv xatosi: ${e.message}`;
            }
        }

        async function execute(cmd) {
            const lower = cmd.toLowerCase().trim();
            if (!lower) {
                addMessage('meddex', 'Buyruq yozmadingiz, Xo\'jayin.');
                return;
            }

            // Qidiruv
            const searchKeywords = ['qidir', 'search', 'izla', 'top', 'qidiruv'];
            let isSearch = false;
            let searchQuery = lower;
            for (const kw of searchKeywords) {
                if (lower.startsWith(kw)) {
                    isSearch = true;
                    searchQuery = lower.replace(kw, '').trim();
                    break;
                }
            }
            if (!isSearch && (lower.includes('ob-havo') || lower.includes('yangilik') || lower.includes('narx') || lower.includes('kurs') || lower.includes('bugun'))) {
                isSearch = true;
                searchQuery = lower;
            }

            if (isSearch && searchQuery.length > 0) {
                showTyping();
                isProcessing = true;
                try {
                    const result = await searchWeb(searchQuery);
                    removeTyping();
                    addMessage('meddex', `🔎 ${result}`, true);
                } catch (e) {
                    removeTyping();
                    addMessage('meddex', `❌ ${e.message}`);
                } finally {
                    isProcessing = false;
                }
                return;
            }

            // Mahalliy buyruqlar
            const salom_sozlar = ['salom', 'assalom', 'hello', 'hola', 'bonjour', 'hallo', 'merhaba', 'привет', 'مرحبا', '你好', 'こんにちは', '안녕하세요'];
            if (salom_sozlar.some(s => lower.includes(s))) {
                const lang = detectLanguage(cmd);
                const greetings = {
                    'uz': 'Assalomu alaykum, Xo\'jayin!',
                    'en': 'Hello, Master!',
                    'ru': 'Здравствуйте, Хозяин!',
                    'ar': 'السلام عليكم، سيدي!',
                    'tr': 'Merhaba, Efendim!',
                    'fr': 'Bonjour, Maître!',
                    'de': 'Hallo, Meister!',
                    'es': '¡Hola, Maestro!',
                    'zh': '你好，主人！',
                    'ja': 'こんにちは、主人！',
                    'ko': '안녕하세요, 주인님!'
                };
                addMessage('meddex', greetings[lang] || greetings['uz']);
                return;
            }

            if (lower.includes('vaqt') || lower.includes('time') || lower.includes('время') || lower.includes('وقت')) {
                const now = new Date();
                addMessage('meddex', `🕒 ${now.toLocaleString()}`);
                return;
            }

            if (lower.includes('rahmat') || lower.includes('thanks') || lower.includes('спасибо') || lower.includes('شكرا')) {
                const lang = detectLanguage(cmd);
                const thanks = {
                    'uz': 'Doim xizmatda, Xo\'jayin! 🙏',
                    'en': 'Always at your service, Master! 🙏',
                    'ru': 'Всегда к вашим услугам, Хозяин! 🙏',
                    'ar': 'في خدمتك دائمًا، سيدي! 🙏',
                    'tr': 'Her zaman hizmetinizdeyim, Efendim! 🙏',
                    'fr': 'Toujours à votre service, Maître! 🙏',
                    'de': 'Immer zu Ihren Diensten, Meister! 🙏',
                    'es': 'Siempre a su servicio, Maestro! 🙏'
                };
                addMessage('meddex', thanks[lang] || thanks['uz']);
                return;
            }

            // DeepSeek AI
            showTyping();
            isProcessing = true;
            try {
                const response = await askDeepSeek(cmd);
                removeTyping();
                addMessage('meddex', response, true);
            } catch (error) {
                removeTyping();
                addMessage('meddex', `❌ ${error.message}`);
            } finally {
                isProcessing = false;
            }
        }

        // Tilni aniqlash
        function detectLanguage(text) {
            const patterns = {
                'uz': /[oO']|[ққ]|[ғғ]|[ҳҳ]|[ўў]|salom|assalom|rahmat|vaqt/i,
                'ru': /[а-яА-Я]|привет|спасибо|время/i,
                'en': /[a-zA-Z]|hello|thanks|time|weather/i,
                'ar': /[اإأآببتثجحخدذرزسشصضطظعغفقكلمنهوي]|مرحبا|شكرا/i,
                'tr': /[çÇğĞıİöÖşŞüÜ]|merhaba|teşekkür|saat/i,
                'fr': /[éèêëàâîôûç]|bonjour|merci|temps/i,
                'de': /[äöüÄÖÜß]|hallo|danke|zeit/i,
                'es': /[ñÑáéíóú]|hola|gracias|tiempo/i,
                'zh': /[\u4e00-\u9fff]|你好|谢谢/i,
                'ja': /[\u3040-\u309f\u30a0-\u30ff]|こんにちは|ありがとう/i,
                'ko': /[\uac00-\ud7af]|안녕하세요|감사합니다/i
            };
            for (const [lang, pattern] of Object.entries(patterns)) {
                if (pattern.test(text)) return lang;
            }
            return 'uz';
        }

        function handleSend() {
            const text = input.value.trim();
            if (!text || isProcessing) return;
            addMessage('user', text);
            input.value = '';
            execute(text);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        input.focus();

        // Ovozli buyruqlar
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'uz-UZ';
            recognition.continuous = false;
            recognition.interimResults = false;

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && e.ctrlKey) {
                    e.preventDefault();
                    recognition.start();
                    addMessage('meddex', '🎤 Gapingizni yozmoqdaman...');
                }
            });

            recognition.onresult = (e) => {
                const spoken = e.results[0][0].transcript;
                addMessage('user', '🎤 ' + spoken);
                execute(spoken);
            };

            recognition.onerror = () => {
                addMessage('meddex', '❌ Ovoz eshitilmadi. Qayta urinib ko\'ring.');
            };
        }
    })();
</script>
</body>
</html>
