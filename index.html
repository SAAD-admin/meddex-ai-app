
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Meddex AI — Jarvis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #0a0a0f;
            overflow: hidden;
            position: relative;
        }

        /* ===== HACKER USLUBIDAGI FON ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0,255,100,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,200,255,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0,255,150,0.02) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== YULDUZLAR ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(0,255,100,0.2), transparent),
                radial-gradient(1px 1px at 30% 70%, rgba(0,255,100,0.15), transparent),
                radial-gradient(1px 1px at 50% 10%, rgba(0,255,100,0.25), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(0,255,100,0.10), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(0,255,100,0.18), transparent);
            background-size: 200px 200px;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== ORQA FONDAGI "SAAD" ===== */
        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(120px, 28vw, 320px);
            font-weight: 900;
            color: rgba(0,255,100,0.015);
            letter-spacing: 20px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            user-select: none;
            z-index: 0;
            white-space: nowrap;
            text-shadow: 0 0 80px rgba(0,255,100,0.04), 0 0 160px rgba(0,255,100,0.02);
            animation: pulseGlow 8s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 80px rgba(0,255,100,0.04), 0 0 160px rgba(0,255,100,0.02); }
            50% { text-shadow: 0 0 120px rgba(0,255,100,0.08), 0 0 240px rgba(0,255,100,0.04); }
            100% { text-shadow: 0 0 80px rgba(0,255,100,0.04), 0 0 160px rgba(0,255,100,0.02); }
        }

        /* ===== GLASS KARTA ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            background: rgba(0,10,0,0.45);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border-radius: 56px;
            padding: 36px 28px 32px;
            border: 1px solid rgba(0,255,100,0.08);
            box-shadow:
                0 40px 100px rgba(0,0,0,0.8),
                0 0 0 1px rgba(0,255,100,0.03) inset,
                0 0 60px rgba(0,255,100,0.02);
            transition: all 0.4s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(0,255,100,0.06);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00ff6a, #00cc55, #009944);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 30px rgba(0,255,100,0.15);
            flex-shrink: 0;
            animation: avatarGlow 3s ease-in-out infinite;
        }
        @keyframes avatarGlow {
            0% { box-shadow: 0 0 20px rgba(0,255,100,0.1); }
            50% { box-shadow: 0 0 60px rgba(0,255,100,0.25); }
            100% { box-shadow: 0 0 20px rgba(0,255,100,0.1); }
        }
        .title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #00ff88, #00ff55, #88ff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Orbitron', sans-serif;
        }
        .badge {
            background: rgba(0,255,100,0.06);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            color: #00ff88;
            border: 1px solid rgba(0,255,100,0.06);
            white-space: nowrap;
            backdrop-filter: blur(4px);
            letter-spacing: 0.4px;
            font-family: 'Orbitron', sans-serif;
        }

        /* ===== CHAT ===== */
        #chat {
            background: rgba(0,0,0,0.25);
            border-radius: 28px;
            padding: 24px 20px;
            min-height: 340px;
            max-height: 440px;
            overflow-y: auto;
            margin-bottom: 22px;
            font-size: 15px;
            line-height: 1.8;
            border: 1px solid rgba(0,255,100,0.04);
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.2);
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #00ff55, #00cc44); border-radius: 20px; }

        .msg {
            margin-bottom: 16px;
            animation: fadeUp 0.35s ease;
        }
        .msg:last-child { margin-bottom: 0; }
        .msg .meddex {
            color: #00ff88;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-shadow: 0 0 30px rgba(0,255,100,0.08);
        }
        .msg .user {
            color: #88ffbb;
            font-weight: 600;
        }
        .msg .text {
            display: inline-block;
            background: rgba(0,255,100,0.03);
            padding: 6px 16px 6px 8px;
            border-radius: 16px 16px 16px 4px;
            border-left: 2px solid rgba(0,255,100,0.10);
        }
        .msg.user-msg .text {
            background: rgba(0,255,100,0.05);
            border-radius: 16px 16px 4px 16px;
            border-left: 2px solid rgba(0,255,100,0.10);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== INPUT ===== */
        .input-row {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.30);
            border-radius: 60px;
            padding: 4px 4px 4px 24px;
            border: 1px solid rgba(0,255,100,0.04);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .input-row:focus-within {
            border-color: rgba(0,255,100,0.12);
            background: rgba(0,0,0,0.35);
            box-shadow: 0 0 40px rgba(0,255,100,0.02);
        }
        input {
            flex: 1;
            padding: 16px 0;
            border: none;
            background: transparent;
            color: #ccffdd;
            font-size: 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }
        input::placeholder {
            color: #4a6a5a;
            font-weight: 400;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .btn-send {
            padding: 14px 24px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #00ff55, #00cc44, #009933);
            color: #001a0a;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 24px rgba(0,255,100,0.10);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.3px;
        }
        .btn-send:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 40px rgba(0,255,100,0.20);
        }
        .btn-send:active { transform: scale(0.95); opacity: 0.85; }

        .btn-mic {
            padding: 14px 18px;
            border-radius: 40px;
            border: none;
            background: rgba(0,255,100,0.04);
            color: #00ff88;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(0,255,100,0.04);
        }
        .btn-mic:hover {
            background: rgba(0,255,100,0.08);
            border-color: rgba(0,255,100,0.10);
            transform: scale(1.05);
        }
        .btn-mic:active { transform: scale(0.90); }

        /* ===== TINGLASH ANIMATSIYASI (JARVIS USLUBIDA) ===== */
        .btn-mic.listening {
            background: rgba(0,255,100,0.10);
            border-color: rgba(0,255,100,0.20);
            color: #00ff66;
            animation: pulseMic 1.2s ease-in-out infinite;
        }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(0,255,100,0.2), 0 0 20px rgba(0,255,100,0.05); }
            50% { box-shadow: 0 0 0 10px rgba(0,255,100,0), 0 0 60px rgba(0,255,100,0.10); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,100,0.2), 0 0 20px rgba(0,255,100,0.05); }
        }

        /* ===== TINGLASH TO'LQINI ===== */
        .wave-container {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            justify-content: center;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }
        .wave-container.active {
            display: flex;
        }
        .wave-bar {
            width: 4px;
            height: 20px;
            background: #00ff55;
            border-radius: 4px;
            animation: wave 0.6s ease-in-out infinite alternate;
        }
        .wave-bar:nth-child(1) { animation-delay: 0.0s; height: 12px; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 24px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 32px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 28px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 36px; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 20px; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 14px; }
        @keyframes wave {
            0% { transform: scaleY(0.3); opacity: 0.3; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #3a5a4a;
            letter-spacing: 0.2px;
        }
        .footer span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #00ff55, #00cc44);
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }
        .hint {
            font-size: 12px;
            color: #3a5a4a;
        }
        .hint i {
            color: #00ff88;
            font-style: normal;
        }
        .typing {
            color: #00ff88;
            font-style: italic;
            opacity: 0.6;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ===== STATUS CHIZIG'I ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 4px 4px;
            font-size: 10px;
            color: #2a5a3a;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }
        .status-bar .green {
            color: #00ff55;
        }
        .status-bar .dim {
            color: #1a3a2a;
        }

        @media (max-width: 520px) {
            .glass-card { padding: 22px 18px 24px; border-radius: 36px; }
            .title { font-size: 20px; }
            .avatar { width: 48px; height: 48px; font-size: 22px; }
            #chat { min-height: 240px; max-height: 320px; padding: 16px 14px; font-size: 14px; }
            .btn-send { padding: 12px 18px; font-size: 14px; }
            .btn-mic { padding: 12px 14px; font-size: 18px; }
            .bg-text { font-size: clamp(80px, 20vw, 160px); letter-spacing: 12px; }
        }
    </style>
</head>
<body>

<div class="bg-text">SAAD</div>

<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <div class="avatar">🧠</div>
            <div class="title">Meddex AI</div>
        </div>
        <div class="badge">⚡ J.A.R.V.I.S</div>
    </div>

    <div id="chat">
        <div class="msg"><span class="meddex">Meddex</span> <span class="text">Assalomu alaykum, Xo'jayin! Men Jarvis darajasidagi AI — hamma narsani tushunaman va bajaraman.</span></div>
    </div>

    <div class="input-row">
        <input type="text" id="userInput" placeholder="Buyruq yozing..." autocomplete="off" />
        <div class="btn-group">
            <button class="btn-mic" id="micBtn" title="Ovozli buyruq">🎤</button>
            <button class="btn-send" id="sendBtn">➤ Yuborish</button>
        </div>
    </div>

    <div class="wave-container" id="waveContainer">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>

    <div class="footer">
        <span><span class="dot"></span> Onlayn</span>
        <span class="hint">💡 <i>🎤</i> tugmasini bosing va gapiring</span>
    </div>

    <div class="status-bar">
        <span class="green">● SISTEMA FAOL</span>
        <span class="dim">|</span>
        <span class="green">100+ TIL</span>
        <span class="dim">|</span>
        <span class="green">🔒 XAVFSIZ</span>
    </div>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const waveContainer = document.getElementById('waveContainer');
        let isProcessing = false;
        let memory = [];
        let isListening = false;

        // ===== OVOZ =====
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'uz-UZ';
            recognition.continuous = false;
            recognition.interimResults = false;
        }

        function toggleMic() {
            if (!recognition) {
                addMessage('meddex', '❌ Brauzeringiz ovozli buyruqlarni qo‘llab-quvvatlamaydi.');
                return;
            }
            if (isListening) {
                recognition.stop();
                return;
            }
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('listening');
                waveContainer.classList.add('active');
                micBtn.textContent = '⏹';
                addMessage('meddex', '🎤 Gapingizni yozmoqdaman...');
            } catch (e) {
                addMessage('meddex', '❌ Mikrofon ishga tushmadi.');
            }
        }

        if (recognition) {
            recognition.onresult = (e) => {
                const spoken = e.results[0][0].transcript;
                addMessage('user', '🎤 ' + spoken);
                input.value = spoken;
                stopListening();
                handleSend();
            };
            recognition.onerror = () => {
                addMessage('meddex', '❌ Ovoz eshitilmadi.');
                stopListening();
            };
            recognition.onend = () => { stopListening(); };
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            waveContainer.classList.remove('active');
            micBtn.textContent = '🎤';
        }

        micBtn.addEventListener('click', toggleMic);

        // ===== XABAR =====
        function addMessage(who, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = 'msg' + (who === 'user' ? ' user-msg' : '');
            const label = who === 'meddex' ? 'Meddex' : 'Siz';
            const cls = who === 'meddex' ? 'meddex' : 'user';
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<span class="${cls}">${label}</span> <span class="text">${content}</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (who === 'user') memory.push({ role: 'user', content: text });
            else memory.push({ role: 'assistant', content: text });
            if (memory.length > 50) memory.shift();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'msg';
            div.innerHTML = `<span class="meddex">Meddex</span> <span class="text typing">● ● ●</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // ===== BUYRUQLAR =====
        async function execute(cmd) {
            const lower = cmd.toLowerCase().trim();
            if (!lower) {
                addMessage('meddex', 'Buyruq yozmadingiz, Xo\'jayin.');
                return;
            }

            // Salom
            if (['salom','assalom','hello','hola','bonjour','hallo','merhaba','привет','مرحبا','你好','こんにちは','안녕하세요'].some(s => lower.includes(s))) {
                addMessage('meddex', 'Assalomu alaykum, Xo\'jayin! Men Jarvis darajasidagi AI — hamma narsaga tayyorman.');
                return;
            }

            // Vaqt
            if (lower.includes('vaqt') || lower.includes('time') || lower.includes('время') || lower.includes('وقت')) {
                addMessage('meddex', `🕒 ${new Date().toLocaleString()}`);
                return;
            }

            // Rahmat
            if (lower.includes('rahmat') || lower.includes('thanks') || lower.includes('спасибо') || lower.includes('شكرا')) {
                addMessage('meddex', 'Doim xizmatda, Xo\'jayin! 🙏');
                return;
            }

            // Eslatma
            if (lower.includes('eslatma') && !lower.includes('lar')) {
                const note = lower.replace('eslatma', '').trim();
                if (note) {
                    if (!window.notes) window.notes = [];
                    window.notes.push(note);
                    addMessage('meddex', `✅ Eslatma saqlandi: “${note}”`);
                } else {
                    addMessage('meddex', 'Eslatma matnini yozing.');
                }
                return;
            }
            if (lower.includes('eslatmalar')) {
                if (window.notes && window.notes.length) {
                    addMessage('meddex', `📋 Eslatmalar:<br>${window.notes.map((n,i)=>`${i+1}. ${n}`).join('<br>')}`, true);
                } else {
                    addMessage('meddex', 'Hali eslatma yo‘q.');
                }
                return;
            }

            // Brauzer
            if (lower.includes('och') && lower.includes('brauzer')) {
                window.open('https://google.com', '_blank');
                addMessage('meddex', '🌐 Brauzer ochildi.');
                return;
            }

            // Xotira
            if (lower.includes('xotira') || lower.includes('eslab')) {
                if (memory.length > 2) {
                    addMessage('meddex', `🧠 Oxirgi eslab qolganlarim:<br>${memory.slice(-3).map(m=>`${m.role}: ${m.content}`).join('<br>')}`, true);
                } else {
                    addMessage('meddex', 'Hali xotirada yetarli ma\'lumot yo‘q.');
                }
                return;
            }

            // Qidiruv
            const searchKw = ['qidir','search','izla','top','qidiruv'];
            let isSearch = false, query = lower;
            for (const kw of searchKw) {
                if (lower.startsWith(kw)) { isSearch = true; query = lower.replace(kw,'').trim(); break; }
            }
            if (!isSearch && (lower.includes('ob-havo') || lower.includes('yangilik') || lower.includes('narx') || lower.includes('kurs') || lower.includes('bugun'))) {
                isSearch = true;
                query = lower;
            }

            if (isSearch && query.length > 0) {
                showTyping();
                isProcessing = true;
                try {
                    const result = await searchWeb(query);
                    removeTyping();
                    addMessage('meddex', `🔎 ${result}`, true);
                } catch (e) {
                    removeTyping();
                    addMessage('meddex', `❌ ${e.message}`);
                } finally {
                    isProcessing = false;
                }
                return;
            }

            addMessage('meddex', `“${cmd}” — buyruq bajarildi, Xo'jayin.`);
        }

        async function searchWeb(query) {
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Qidiruv xatosi');
                const data = await res.json();
                if (data.AbstractText) return data.AbstractText;
                if (data.RelatedTopics && data.RelatedTopics.length) {
                    return data.RelatedTopics.slice(0,3).map(t => t.Text?.replace(/<[^>]+>/g,'') || '').filter(t=>t.length>10).join('<br>');
                }
                return 'Ma\'lumot topilmadi.';
            } catch (e) {
                return `Xatolik: ${e.message}`;
            }
        }

        function handleSend() {
            const text = input.value.trim();
            if (!text || isProcessing) return;
            addMessage('user', text);
            input.value = '';
            execute(text);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });
        input.focus();
    })();
